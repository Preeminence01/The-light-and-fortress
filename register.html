<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Light and Fortress Alliance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand brand" href="index.html"><img src="ChatGPT Image Jun 18, 2026, 01_53_04 AM.png" alt="The Light and Fortress Alliance logo"><span>The Light and<br>Fortress Alliance</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
                    <li class="nav-item" data-auth-nav></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <div class="page-hero-inner">
                <p class="eyebrow">Member registration</p>
                <h1>Join the alliance</h1>
                <p>Create a member profile with your details and profile picture.</p>
            </div>
        </section>
        <section class="section">
            <div id="registerMessage"></div>
            <form id="registerForm" class="form-panel card shadow-sm" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Full name</label><input class="form-control" name="name" required></div>
                    <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
                    <div class="col-md-6"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
                    <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
                    <div class="col-md-6"><label class="form-label">Location</label><input class="form-control" name="location"></div>
                    <div class="col-md-6"><label class="form-label">Role</label><input class="form-control" name="role" placeholder="Volunteer, Advocate, Member"></div>
                    <div class="col-md-6"><label class="form-label">Profile picture</label><input class="form-control" type="file" name="profilePicture" accept="image/*"></div>
                    <div class="col-md-6"><label class="form-label">Visibility</label><select class="form-select" name="visibility"><option value="public">Visible to other members</option><option value="private">Private</option></select></div>
                    <div class="col-12"><label class="form-label">Short bio</label><textarea class="form-control" name="bio" rows="4"></textarea></div>
                </div>
                <button class="btn mt-4" type="submit">Register</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
